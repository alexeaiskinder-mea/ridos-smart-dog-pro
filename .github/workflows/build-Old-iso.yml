name: Build RIDOS OS ISO — Smart Dog Edition

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 180   # رُفع من 120 → 180 لاستيعاب تحميل Ollama + Llama3 (4.7GB)

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub2-common \
            mtools dosfstools gnupg2 curl wget \
            imagemagick librsvg2-bin inkscape
          echo "✅ Build deps done"

      - name: Bootstrap Debian bookworm
        run: |
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/debian-bookworm.gpg
          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            --keyring=/usr/share/keyrings/debian-bookworm.gpg \
            --include=systemd,systemd-sysv,udev,sudo,locales,bash,apt-transport-https,ca-certificates \
            bookworm chroot http://deb.debian.org/debian/
          echo "✅ Bootstrap done"

      # ─────────────────────────────────────────────────────────────
      # MOUNT (مرة واحدة فقط — هذا كان الخطأ الأول في النسخة القديمة)
      # ─────────────────────────────────────────────────────────────
      - name: Mount chroot filesystems
        run: |
          sudo mount --bind /dev  chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys  chroot/sys
          sudo mount --bind /run  chroot/run
          echo "✅ chroot mounts ready"

      - name: Write APT sources
        run: |
          printf '%s\n' \
            'deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware' \
            'deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware' \
            'deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware' \
            | sudo tee chroot/etc/apt/sources.list > /dev/null
          sudo chroot chroot apt-get update -qq
          echo "✅ sources.list written"

      - name: Install core system packages
        run: |
          sudo chroot chroot apt-get install -y \
            live-boot live-boot-initramfs-tools \
            linux-image-amd64 initramfs-tools \
            grub-pc grub-pc-bin grub2-common grub-common \
            grub-efi-amd64-bin grub-efi-amd64-signed \
            shim-signed shim-helpers-amd64-signed \
            efibootmgr os-prober \
            bash-completion tzdata locales

      - name: Install hardware drivers
        run: |
          sudo chroot chroot apt-get install -y \
            firmware-linux firmware-linux-free firmware-linux-nonfree \
            firmware-iwlwifi firmware-atheros firmware-realtek \
            firmware-b43-installer firmware-amd-graphics \
            firmware-misc-nonfree intel-microcode amd64-microcode \
            xserver-xorg xserver-xorg-video-all xserver-xorg-input-all \
            xserver-xorg-video-intel xserver-xorg-video-amdgpu \
            xserver-xorg-video-nouveau xserver-xorg-video-fbdev \
            xserver-xorg-video-vesa \
            alsa-utils pulseaudio pulseaudio-utils \
            bluez bluetooth cups printer-driver-all \
            network-manager network-manager-gnome \
            wpasupplicant wireless-tools usb-modeswitch \
            pciutils usbutils acpi acpid laptop-detect \
            ntfs-3g exfat-fuse \
            --no-install-recommends || true

      - name: Install XFCE desktop
        run: |
          sudo chroot chroot apt-get install -y \
            xfce4 xfce4-terminal xfce4-whiskermenu-plugin \
            xfce4-power-manager xfce4-notifyd \
            lightdm lightdm-gtk-greeter \
            thunar thunar-archive-plugin ristretto mousepad \
            adwaita-icon-theme papirus-icon-theme \
            fonts-dejavu fonts-liberation fonts-noto fonts-noto-color-emoji

      - name: Install virtualisation guest tools
        run: |
          sudo chroot chroot apt-get install -y virtualbox-guest-utils virtualbox-guest-x11 || true
          sudo chroot chroot apt-get install -y open-vm-tools open-vm-tools-desktop spice-vdagent || true
          sudo chroot chroot systemctl enable spice-vdagentd       2>/dev/null || true
          sudo chroot chroot systemctl enable virtualbox-guest-utils 2>/dev/null || true

      - name: Install browser and locale data
        run: |
          sudo chroot chroot apt-get install -y firefox-esr
          sudo chroot chroot apt-get install -y \
            tzdata locales keyboard-configuration console-setup \
            kbd locales-all 2>/dev/null || true

      - name: Install Calamares installer
        run: |
          sudo chroot chroot apt-get install -y --no-install-recommends calamares \
            && echo "✅ Calamares installed" || echo "❌ Calamares FAILED — will use bash fallback"
          sudo chroot chroot apt-get install -y \
            qml-module-qtquick2 qml-module-qtquick-controls2 \
            qml-module-qtquick-layouts python3-pyqt5 \
            efibootmgr os-prober || true

      - name: Install dev and IT tools
        run: |
          sudo chroot chroot apt-get install -y \
            python3 python3-pip python3-venv \
            python3-tk \
            python3-flask python3-flask-socketio \
            python3-requests python3-psutil \
            git vim nano curl wget \
            nmap net-tools traceroute \
            openssh-client openssh-server \
            htop neofetch tree \
            zip unzip p7zip-full \
            parted gparted rsync dosfstools \
            smartmontools hdparm memtest86+ \
            lshw dmidecode iotop iftop \
            wireshark-common tshark squashfs-tools \
            dkms build-essential linux-headers-amd64

      # ─────────────────────────────────────────────────────────────
      # ميزة #5 — SIGINT Suite (RTL-SDR + Gqrx + Inspectrum)
      # ─────────────────────────────────────────────────────────────
      - name: Install SIGINT / SDR tools
        run: |
          sudo chroot chroot apt-get install -y \
            rtl-sdr librtlsdr-dev \
            gqrx-sdr \
            inspectrum \
            gnuradio gr-osmosdr \
            sox libsox-fmt-all \
            multimon-ng \
            direwolf \
            cubicsdr || true

          # udev rules — تفعيل RTL-SDR بدون صلاحيات root
          sudo tee chroot/etc/udev/rules.d/20-rtlsdr.rules > /dev/null <<'UDEV'
          SUBSYSTEM=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2832", GROUP="plugdev", MODE="0664", SYMLINK+="rtl_sdr"
          SUBSYSTEM=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2838", GROUP="plugdev", MODE="0664", SYMLINK+="rtl_sdr"
          SUBSYSTEM=="usb", ATTRS{idVendor}=="0bda", ATTRS{idProduct}=="2840", GROUP="plugdev", MODE="0664", SYMLINK+="rtl_sdr"
          SUBSYSTEM=="usb", ATTRS{idVendor}=="1f4d", ATTRS{idProduct}=="b803", GROUP="plugdev", MODE="0664", SYMLINK+="rtl_sdr"
          UDEV
          echo "✅ SIGINT tools installed"

      # ─────────────────────────────────────────────────────────────
      # ميزة #2 — Offline AI Brain (Ollama + Llama3:8b-q4)
      # ─────────────────────────────────────────────────────────────
      - name: Install Ollama and pull Llama3 model
        run: |
          # تثبيت Ollama داخل الـ chroot
          sudo chroot chroot bash -c '
            curl -fsSL https://ollama.com/install.sh | sh
          '

          # إطلاق Ollama مؤقتاً لتحميل الموديل
          sudo chroot chroot bash -c '
            ollama serve &
            OLLAMA_PID=$!
            sleep 5

            echo "📥 Pulling llama3:8b-q4_0 (~4.7GB)..."
            ollama pull llama3:8b-q4_0

            echo "📥 Pulling nomic-embed-text (embeddings)..."
            ollama pull nomic-embed-text

            kill $OLLAMA_PID 2>/dev/null || true
            wait $OLLAMA_PID 2>/dev/null || true
          '

          # التحقق من وجود الموديل
          if sudo chroot chroot test -d /root/.ollama/models; then
            echo "✅ Ollama models present"
            sudo du -sh chroot/root/.ollama/models
          else
            echo "❌ Ollama models missing"
            exit 1
          fi

          # نقل الموديلات إلى مجلد مشترك متاح للمستخدم ridos
          sudo chroot chroot bash -c '
            mkdir -p /opt/ridos/ollama-models
            cp -r /root/.ollama /opt/ridos/ollama-models/ 2>/dev/null || true
          '

          # systemd service للـ Ollama
          sudo tee chroot/etc/systemd/system/ollama.service > /dev/null <<'SYSTEMD'
          [Unit]
          Description=Ollama Offline AI Server
          After=network.target

          [Service]
          Type=simple
          User=ridos
          Environment=OLLAMA_HOME=/opt/ridos/ollama-models/.ollama
          Environment=OLLAMA_HOST=127.0.0.1:11434
          ExecStart=/usr/local/bin/ollama serve
          Restart=on-failure
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          SYSTEMD

          sudo chroot chroot systemctl enable ollama 2>/dev/null || true
          echo "✅ Ollama service enabled"

      # ─────────────────────────────────────────────────────────────
      # UNMOUNT (مرة واحدة فقط — بعد كل التثبيتات)
      # ─────────────────────────────────────────────────────────────
      - name: Unmount chroot filesystems
        run: |
          sudo umount chroot/run  2>/dev/null || true
          sudo umount chroot/sys  2>/dev/null || true
          sudo umount chroot/proc 2>/dev/null || true
          sudo umount chroot/dev  2>/dev/null || true
          echo "✅ Unmounted cleanly"

      - name: Configure system
        run: |
          sudo python3 build-system/scripts/configure-system.py
          echo "✅ System configured"

      - name: Configure Calamares installer
        run: |
          sudo python3 build-system/scripts/configure-calamares.py
          echo "✅ Calamares configured"

      - name: Apply RIDOS branding and theme
        run: |
          sudo python3 build-system/scripts/apply-branding.py
          echo "✅ Branding applied"

      # ─────────────────────────────────────────────────────────────
      # نسخ الصورة — خلفية سطح المكتب
      # ضع الصورة في: assets/image_0.png  داخل الـ repository
      # ─────────────────────────────────────────────────────────────
      - name: Copy custom wallpaper
        run: |
          sudo mkdir -p chroot/usr/share/ridos/wallpapers
          if [ -f assets/image_0.png ]; then
            sudo cp assets/image_0.png chroot/usr/share/ridos/wallpapers/ridos-wallpaper.png
            echo "✅ Wallpaper copied from assets/image_0.png"
          elif [ -f image_0.png ]; then
            sudo cp image_0.png chroot/usr/share/ridos/wallpapers/ridos-wallpaper.png
            echo "✅ Wallpaper copied from image_0.png"
          else
            echo "⚠ image_0.png not found — generating purple fallback"
            sudo apt-get install -y imagemagick -qq 2>/dev/null || true
            convert -size 1920x1080 xc:"#1a0a2e" \
              -fill "#6B21A8" -draw "rectangle 0,1060 1920,1080" \
              chroot/usr/share/ridos/wallpapers/ridos-wallpaper.png 2>/dev/null || true
          fi

      - name: Install RIDOS core files
        run: |
          sudo mkdir -p chroot/opt/ridos/bin
          sudo mkdir -p chroot/usr/share/ridos

          # ridos-core — copy only if folder exists (optional)
          if [ -d ridos-core ] && ls ridos-core/*.py 2>/dev/null; then
            sudo cp ridos-core/*.py chroot/opt/ridos/bin/
            sudo chmod +x chroot/opt/ridos/bin/control_center.py 2>/dev/null || true
            echo "✅ ridos-core files copied"
          else
            echo "⚠ ridos-core/ not found — skipping (optional folder)"
          fi

          # build-system scripts — each guarded individually
          sudo cp build-system/scripts/ai_features.py        chroot/opt/ridos/bin/ 2>/dev/null || true
          sudo cp build-system/scripts/smart_dog_terminal.py chroot/opt/ridos/bin/ 2>/dev/null || true
          sudo cp build-system/scripts/dashboard_server.py   chroot/opt/ridos/bin/ 2>/dev/null || true
          sudo cp build-system/scripts/ridos-dashboard.html  chroot/opt/ridos/bin/ 2>/dev/null || true

          # panic-key — copy script if exists, else create minimal placeholder
          if [ -f build-system/scripts/panic_key.sh ]; then
            sudo cp build-system/scripts/panic_key.sh chroot/usr/local/bin/panic-key
          else
            echo "⚠ panic_key.sh not found — panic-key already created by configure-system.py"
          fi

          sudo chmod +x chroot/opt/ridos/bin/*.py           2>/dev/null || true
          sudo chmod +x chroot/usr/local/bin/panic-key      2>/dev/null || true

          # Smart Dog Terminal — symlink في PATH
          if [ -f chroot/opt/ridos/bin/smart_dog_terminal.py ]; then
            sudo ln -sf /opt/ridos/bin/smart_dog_terminal.py chroot/usr/local/bin/sdt
            echo "✅ sdt symlink created"
          fi

          # GRUB helper — optional
          if [ -f build-system/scripts/ridos-grub-install.sh ]; then
            sudo cp build-system/scripts/ridos-grub-install.sh chroot/usr/local/bin/ridos-grub-install
            sudo chmod +x chroot/usr/local/bin/ridos-grub-install
          fi

          # legal files — optional
          if [ -d legal ]; then
            sudo cp legal/LICENSE.txt   chroot/usr/share/ridos/ 2>/dev/null || true
            sudo cp legal/COPYRIGHT     chroot/usr/share/ridos/ 2>/dev/null || true
            sudo cp legal/CONTRIBUTORS.md chroot/usr/share/ridos/ 2>/dev/null || true
          fi

          # install-ridos-files.py — optional
          if [ -f build-system/scripts/install-ridos-files.py ]; then
            sudo python3 build-system/scripts/install-ridos-files.py
          fi

          echo "✅ RIDOS files installed"

      - name: Build squashfs filesystem
        run: |
          sudo mksquashfs chroot filesystem.squashfs \
            -comp xz -e boot -noappend
          echo "squashfs: $(du -sh filesystem.squashfs)"

      - name: Prepare ISO structure
        run: |
          mkdir -p iso/live iso/boot/grub
          cp filesystem.squashfs iso/live/
          KERNEL=$(ls chroot/boot/vmlinuz-* 2>/dev/null | sort -V | tail -1)
          INITRD=$(ls chroot/boot/initrd.img-* 2>/dev/null | sort -V | tail -1)
          echo "Kernel: $KERNEL  Initrd: $INITRD"
          cp "$KERNEL" iso/live/vmlinuz
          cp "$INITRD" iso/live/initrd
          python3 build-system/scripts/write-grub-config.py
          echo "✅ ISO structure ready"

      - name: Build GRUB and create bootable ISO
        run: |
          grub-mkimage -O i386-pc -o bios.core.img \
            -p "/boot/grub" iso9660 linux normal biosdisk search
          cat /usr/lib/grub/i386-pc/cdboot.img bios.core.img > bios.img

          # ── UEFI Secure Boot — استخدام shim الموقَّع من Microsoft ──
          # هذا يجعل النظام يعمل بدون الحاجة لتعطيل Secure Boot في BIOS
          dd if=/dev/zero of=efi.img bs=1M count=10 status=none
          mkfs.vfat -F 12 efi.img
          mmd -i efi.img ::/EFI ::/EFI/boot ::/EFI/debian

          # البحث عن shim الموقَّع من Debian (مُثبَّت داخل chroot)
          SHIM_SRC=$(find chroot/usr/lib/shim -name "shimx64.efi.signed" 2>/dev/null | head -1)
          GRUB_SRC=$(find chroot/usr/lib/grub -name "grubx64.efi.signed" 2>/dev/null | head -1)
          SHIM_MM=$(find chroot/usr/lib/shim -name "mmx64.efi" 2>/dev/null | head -1)

          if [ -n "$SHIM_SRC" ]; then
            echo "✅ Using signed shim for Secure Boot compatibility"
            mcopy -i efi.img "$SHIM_SRC"    ::/EFI/boot/bootx64.efi
            mcopy -i efi.img "$GRUB_SRC"    ::/EFI/boot/grubx64.efi   2>/dev/null || true
            [ -n "$SHIM_MM" ] && mcopy -i efi.img "$SHIM_MM" ::/EFI/boot/mmx64.efi || true
          else
            echo "⚠ shim not found — falling back to unsigned GRUB EFI"
            grub-mkimage -O x86_64-efi -o bootx64.efi \
              -p "/boot/grub" iso9660 linux normal search
            mcopy -i efi.img bootx64.efi ::/EFI/boot/bootx64.efi
          fi

          # نسخ GRUB config إلى EFI partition أيضاً
          mcopy -i efi.img iso/boot/grub/grub.cfg ::/EFI/boot/grub.cfg 2>/dev/null || true


          mkdir -p iso/boot/grub/i386-pc
          cp /usr/lib/grub/i386-pc/*.mod iso/boot/grub/i386-pc/ 2>/dev/null || true
          cp /usr/lib/grub/i386-pc/*.lst iso/boot/grub/i386-pc/ 2>/dev/null || true
          cp bios.img iso/boot/grub/bios.img

          xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "RIDOS_SMARTDOG_1.2" \
            -publisher "RIDOS OS Project" \
            --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -partition_offset 16 \
            --mbr-force-bootable \
            -append_partition 2 0xef efi.img \
            -appended_part_as_gpt \
            -iso_mbr_part_type 0x00 \
            -c boot/grub/boot.cat \
            -b boot/grub/bios.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --grub2-boot-info \
            -eltorito-alt-boot \
            -e --interval:appended_partition_2:all:: \
            -no-emul-boot \
            -o ridos-os-1.2.0-SmartDog-x86_64.iso \
            -graft-points \
              "/boot/grub/bios.img=bios.img" \
              "/=iso"

          ls -lh ridos-os-1.2.0-SmartDog-x86_64.iso
          file    ridos-os-1.2.0-SmartDog-x86_64.iso
          md5sum    ridos-os-1.2.0-SmartDog-x86_64.iso > ridos-os-1.2.0-SmartDog-x86_64.iso.md5
          sha256sum ridos-os-1.2.0-SmartDog-x86_64.iso > ridos-os-1.2.0-SmartDog-x86_64.iso.sha256
          echo "✅ ISO ready — Smart Dog Edition!"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-OS-1.2.0-SmartDog
          path: |
            ridos-os-1.2.0-SmartDog-x86_64.iso
            ridos-os-1.2.0-SmartDog-x86_64.iso.md5
            ridos-os-1.2.0-SmartDog-x86_64.iso.sha256
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            ridos-os-1.2.0-SmartDog-x86_64.iso \
            ridos-os-1.2.0-SmartDog-x86_64.iso.md5 \
            ridos-os-1.2.0-SmartDog-x86_64.iso.sha256 \
            --title "RIDOS OS ${{ github.ref_name }} Smart Dog" \
            --notes "RIDOS OS v1.2.0 Smart Dog — Offline AI + SIGINT + Panic Key. Login: ridos/ridos. GPL v3."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

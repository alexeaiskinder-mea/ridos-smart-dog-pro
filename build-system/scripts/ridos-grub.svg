  </defs>
  <rect width="1024" height="768" fill="url(#bg)"/>
  <g stroke="#A78BFA" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="192" x2="1024" y2="192"/>
    <line x1="0" y1="384" x2="1024" y2="384"/>
    <line x1="0" y1="576" x2="1024" y2="576"/>
    <line x1="256" y1="0" x2="256" y2="768"/>
    <line x1="512" y1="0" x2="512" y2="768"/>
    <line x1="768" y1="0" x2="768" y2="768"/>
  </g>
  <!-- Small icon top center -->
  <g transform="translate(462, 180) scale(0.8)">
    <circle cx="100" cy="100" r="90" fill="#0F0A1E" opacity="0.9"/>
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#g)" stroke-width="2"/>
    <line x1="100" y1="20" x2="100" y2="180" stroke="url(#g)" stroke-width="1" opacity="0.2"/>

    <path d="M100,100 L40,100" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <path d="M100,160 L70,160 L60,150" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="100" r="8" fill="#EA580C"/>
    <path d="M100,28 C116,23 138,26 148,40 C160,55 158,72 151,84 C162,93 163,110 154,122 C162,134 156,154 143,161 C130,168 112,165 105,160"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F0A1E"/>
      <stop offset="50%"  stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#2D1B69"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6B21A8"/>
      <stop offset="35%"  stop-color="#C026D3"/>
      <stop offset="70%"  stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B21A8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6B21A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C026D3" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C026D3" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="260"  cy="280"  r="320" fill="url(#glow1)"/>
  <circle cx="1660" cy="800"  r="280" fill="url(#glow2)"/>
  <circle cx="960"  cy="540"  r="500" fill="url(#glow1)"/>

  <!-- Subtle grid -->
  <g stroke="#A78BFA" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="270"  x2="1920" y2="270"/>
    <line x1="0" y1="540"  x2="1920" y2="540"/>
    <line x1="0" y1="810"  x2="1920" y2="810"/>
    <line x1="480"  y1="0" x2="480"  y2="1080"/>
    <line x1="960"  y1="0" x2="960"  y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>

  <!-- Corner circuit decorations -->
  <g stroke="url(#g)" stroke-width="1.5" fill="none" opacity="0.15">
    <path d="M0,180 L140,180 L180,220 L500,220"/>
    <path d="M0,380 L100,380 L140,420 L380,420"/>
    <circle cx="500" cy="220" r="5" fill="#C026D3" stroke="none"/>
    <circle cx="380" cy="420" r="5" fill="#EA580C" stroke="none"/>
    <path d="M1920,200 L1780,200 L1740,240 L1500,240"/>
    <path d="M1920,440 L1820,440 L1780,480 L1560,480"/>
    <circle cx="1500" cy="240" r="5" fill="#C026D3" stroke="none"/>
    <circle cx="1560" cy="480" r="5" fill="#EA580C" stroke="none"/>
    <path d="M380,1080 L380,900 L420,860"/>
    <path d="M1540,1080 L1540,860 L1580,820"/>
    <circle cx="420" cy="860" r="5" fill="#6B21A8" stroke="none"/>
    <circle cx="1580" cy="820" r="5" fill="#6B21A8" stroke="none"/>
  </g>

  <!-- CENTER ICON (large, subtle background version) -->
  <g transform="translate(760, 340) scale(2.0)" opacity="0.08">
    <line x1="100" y1="22" x2="100" y2="178" stroke="url(#g)" stroke-width="1"/>
    <path d="M100,42 L68,42 L56,54"  fill="none" stroke="url(#g)" stroke-width="2"/>
    <path d="M100,68 L52,68 L40,80"  fill="none" stroke="url(#g)" stroke-width="2"/>
    <path d="M100,100 L36,100"        fill="none" stroke="url(#g)" stroke-width="2"/>
    <path d="M100,132 L52,132 L40,120" fill="none" stroke="url(#g)" stroke-width="2"/>
    <path d="M100,30 C116,25 138,28 148,42 C160,57 158,74 151,86 C162,95 163,112 154,124 C162,136 156,156 143,163 C130,170 112,167 105,162"
          fill="none" stroke="url(#g)" stroke-width="2"/>
    <circle cx="36" cy="100" r="8" fill="#EA580C"/>
    <circle cx="100" cy="100" r="10" fill="url(#g)"/>
  </g>

  <!-- MAIN LOGO centered at 960, 520 -->
  <!-- Icon -->
  <g transform="translate(560, 420)">
    <circle cx="100" cy="100" r="90" fill="#0F0A1E" opacity="0.9"/>
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>
    <line x1="100" y1="20" x2="100" y2="180" stroke="url(#g)" stroke-width="1" opacity="0.25"/>
    <!-- Circuit left -->
    <path d="M100,40 L68,40 L58,50"  fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M100,65 L52,65 L42,75"  fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M100,100 L38,100"        fill="none" stroke="url(#g)" stroke-width="3"   stroke-linecap="round"/>
    <path d="M100,135 L52,135 L42,125" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M100,160 L68,160 L58,150" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="75" x2="42" y2="125" stroke="url(#g)" stroke-width="2.5"/>
    <rect x="22" y="80" width="18" height="40" rx="3" fill="#1E1B4B" stroke="url(#g)" stroke-width="1.5"/>
    <line x1="16" y1="88"  x2="22" y2="88"  stroke="#6B21A8" stroke-width="2.5"/>
    <line x1="16" y1="100" x2="22" y2="100" stroke="#C026D3" stroke-width="2.5"/>
    <line x1="16" y1="112" x2="22" y2="112" stroke="#EA580C" stroke-width="2.5"/>
    <circle cx="58" cy="50"  r="6" fill="#6B21A8" filter="url(#glow)"/>
    <circle cx="42" cy="75"  r="7" fill="#C026D3" filter="url(#glow)"/>
    <circle cx="38" cy="100" r="8" fill="#EA580C" filter="url(#glow)"/>
    <circle cx="42" cy="125" r="7" fill="#C026D3" filter="url(#glow)"/>
    <circle cx="58" cy="150" r="6" fill="#F97316" filter="url(#glow)"/>
    <!-- Brain right -->
    <path d="M100,28 C116,23 138,26 148,40 C160,55 158,72 151,84 C162,93 163,110 154,122 C162,134 156,154 143,161 C130,168 112,165 105,160 C102,158 100,155 100,152"
          fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <path d="M110,42 C122,35 142,40 148,53" fill="none" stroke="#C026D3" stroke-width="2" opacity="0.75"/>
    <path d="M106,68 C118,61 144,66 152,78" fill="none" stroke="#C026D3" stroke-width="2" opacity="0.75"/>
    <path d="M103,96 C116,89 146,94 154,106" fill="none" stroke="#EA580C" stroke-width="2" opacity="0.75"/>
    <path d="M105,124 C118,117 140,122 146,134" fill="none" stroke="#EA580C" stroke-width="2" opacity="0.7"/>
    <circle cx="148" cy="54"  r="5" fill="#C026D3" filter="url(#glow)"/>
    <circle cx="153" cy="79"  r="5" fill="#C026D3" filter="url(#glow)"/>
    <circle cx="155" cy="107" r="5" fill="#EA580C" filter="url(#glow)"/>
    <circle cx="147" cy="135" r="5" fill="#EA580C" filter="url(#glow)"/>
    <!-- Center fusion -->
    <circle cx="100" cy="100" r="10" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="100" cy="100" r="4"  fill="white" opacity="0.9"/>
  </g>

  <!-- RIDOS text -->
  <text x="790" y="565"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="160"
        fill="url(#tg)"
        letter-spacing="-4">RIDOS</text>

  <!-- Tagline -->
  <text x="796" y="608"
        font-family="Arial, sans-serif"
        font-weight="300"
        font-size="22"
        fill="#4B5563"
        letter-spacing="10">INTELLIGENT LINUX OS</text>

  <!-- Bottom version line -->
  <text x="960" y="1045"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="13"
        fill="#374151"
        letter-spacing="3">v1.1.0 "Baghdad"  ·  github.com/alexeaiskinder-mea/ridos-os  ·  GPL v3</text>
</svg>
